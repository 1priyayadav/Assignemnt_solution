version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taskapp_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: assignment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskapp_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskapp_backend
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password@db:5432/assignment_db?schema=public
      - JWT_SECRET=super-secret-key-change-in-production
      - NODE_ENV=development
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "npx prisma migrate dev --name init && npm run dev"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskapp_frontend
    environment:
      - VITE_API_URL=https://assignemnt-solution-1.onrender.com/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev -- --host
    depends_on:
      - backend

volumes:
  postgres_data:

